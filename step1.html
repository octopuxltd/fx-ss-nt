<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1</title>
    <link rel="stylesheet" href="step1.css">
    <script src="config.js" onerror="console.warn('config.js not found. Using example config.'); window.API_CONFIG = window.API_CONFIG || { OPENROUTER_API_KEY: '', OPENAI_API_KEY: '', PEXELS_API_KEY: '' };"></script>
    <script src="suggestion-words.js"></script>
</head>
<body>
    <script>
        // Apply reduced motion class immediately to body before any rendering
        if (localStorage.getItem('reduced_motion_enabled') === 'true') {
            console.log('[BODY SCRIPT] Adding reduced-motion class immediately');
            document.body.classList.add('reduced-motion');
        }
    </script>
    <div class="reduced-motion-control">
        <label>
            <input type="checkbox" class="reduced-motion-checkbox">
            <span>Reduced motion</span>
        </label>
    </div>
    
    <img src="icons/Fx-Browser-icon-fullColor-256.png" alt="Firefox" class="firefox-logo">
    
    <div class="search-container">
        <div class="search-box-wrapper-outer">
            <div class="search-box-wrapper">
                <div class="search-switcher-button">
                    <img src="icons/Google.svg" alt="Google" class="google-icon">
                    <img src="icons/chevron-step1.svg" alt="" class="chevron">
                    <div class="search-switcher-dropdown">
                        <div class="dropdown-content">
                            <div class="dropdown-label">Search with:</div>
                            <div class="dropdown-divider"></div>
                            <div class="dropdown-item">Google</div>
                            <div class="dropdown-item">Bing</div>
                            <div class="dropdown-item">DuckDuckGo</div>
                            <div class="dropdown-item">eBay</div>
                            <div class="dropdown-item">Perplexity</div>
                            <div class="dropdown-item">Wikipedia (en)</div>
                            <div class="dropdown-divider"></div>
                            <div class="dropdown-item">Bookmarks</div>
                            <div class="dropdown-item">Tabs</div>
                            <div class="dropdown-item">History</div>
                            <div class="dropdown-item">Actions</div>
                            <div class="dropdown-divider"></div>
                            <div class="dropdown-item">
                                <img src="icons/settings.svg" alt="" class="dropdown-icon">
                                Search Settings
                            </div>
                            <div class="dropdown-item">
                                <img src="icons/pin.svg" alt="" class="dropdown-icon">
                                Pin Search Engines
                            </div>
                        </div>
                    </div>
                </div>
                <input type="text" class="search-input" placeholder="Search with Google">
                <button type="button" class="search-button" aria-label="Search">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <ul class="suggestions-list">
                <div class="suggestions-content">
                    <li class="suggestion-item gmail-item">
                        <img src="icons/Gmail.svg" alt="" class="suggestion-icon">
                        <span class="suggestion-label">Inbox (84) - your.email@gmail.com - Gmail</span>
                    </li>
                    <li class="suggestions-heading">Your Recent Searches</li>
                    <li class="suggestion-item">
                        <img src="icons/clock.svg" alt="" class="suggestion-icon">
                        <span class="suggestion-label">hoka</span>
                    </li>
                    <li class="suggestion-item">
                        <img src="icons/clock.svg" alt="" class="suggestion-icon">
                        <span class="suggestion-label">13 in macbook air</span>
                    </li>
                    <li class="suggestion-item">
                        <img src="icons/clock.svg" alt="" class="suggestion-icon">
                        <span class="suggestion-label">coffee machines for sale</span>
                    </li>
                    <li class="suggestion-item">
                        <img src="icons/clock.svg" alt="" class="suggestion-icon">
                        <span class="suggestion-label">taylor swift</span>
                    </li>
                    <li class="suggestion-item">
                        <img src="icons/clock.svg" alt="" class="suggestion-icon">
                        <span class="suggestion-label">coffee grinder</span>
                    </li>
                </div>
            </ul>
        </div>
    </div>
    
    <script src="step1.js"></script>
</body>
</html>
