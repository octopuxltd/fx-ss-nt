<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1</title>
    <link rel="stylesheet" href="step1.css">
</head>
<body>
    <div class="reduced-motion-control">
        <label>
            <input type="checkbox" class="reduced-motion-checkbox">
            <span>Reduced motion</span>
        </label>
    </div>
    
    <img src="icons/Fx-Browser-icon-fullColor-256.png" alt="Firefox" class="firefox-logo">
    
    <div class="search-container">
        <div class="search-box-wrapper-outer">
            <div class="search-box-wrapper">
                <div class="search-switcher-button">
                    <img src="icons/Google.svg" alt="Google" class="google-icon">
                    <img src="icons/chevron-step1.svg" alt="" class="chevron">
                </div>
                <input type="text" class="search-input" placeholder="Search with Google">
            </div>
            <div class="suggestions-list">
                <div class="suggestion-item gmail-item">
                    <img src="icons/Gmail.svg" alt="" class="suggestion-icon">
                    <span class="suggestion-label">Inbox (84) - your.email@gmail.com - Gmail</span>
                </div>
                <div class="suggestions-heading">Your recent searches</div>
                <div class="suggestion-item">
                    <img src="icons/clock.svg" alt="" class="suggestion-icon">
                    <span class="suggestion-label">hoka</span>
                </div>
                <div class="suggestion-item">
                    <img src="icons/clock.svg" alt="" class="suggestion-icon">
                    <span class="suggestion-label">13 in macbook air</span>
                </div>
                <div class="suggestion-item">
                    <img src="icons/clock.svg" alt="" class="suggestion-icon">
                    <span class="suggestion-label">coffee machines for sale</span>
                </div>
                <div class="suggestion-item">
                    <img src="icons/clock.svg" alt="" class="suggestion-icon">
                    <span class="suggestion-label">taylor swift</span>
                </div>
                <div class="suggestion-item">
                    <img src="icons/clock.svg" alt="" class="suggestion-icon">
                    <span class="suggestion-label">coffee grinder</span>
                </div>
            </div>
        </div>
    </div>
    
    <script src="step1.js"></script>
</body>
</html>
